<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Option Pricer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Option Pricer</h1>
        <p class="subtitle">Power-law tail put option pricing</p>

        <form id="pricer-form">
            <div class="form-group">
                <label for="alpha">Alpha (Tail Exponent)</label>
                <input type="number" id="alpha" step="any" placeholder="e.g. 3.0" required>
            </div>

            <div class="form-group">
                <label for="anchored-put-price">Anchored Put Option Price</label>
                <input type="number" id="anchored-put-price" step="any" placeholder="e.g. 5.00" required>
            </div>

            <div class="form-group">
                <label for="anchored-put-strike">Anchored Put Strike</label>
                <input type="number" id="anchored-put-strike" step="any" placeholder="e.g. 90" required>
            </div>

            <div class="form-group">
                <label for="underlying-price">Current Underlying Price</label>
                <input type="number" id="underlying-price" step="any" placeholder="e.g. 100" required>
            </div>

            <div class="form-group">
                <label for="to-solve-strike">To-Solve Put Strike</label>
                <input type="number" id="to-solve-strike" step="any" placeholder="e.g. 80" required>
            </div>

            <button type="submit" id="calculate-btn">Calculate</button>
        </form>

        <div id="result-section" class="result-section hidden">
            <h2>Result</h2>
            <div class="result-row">
                <span class="result-label">To-Solve Put Option Price:</span>
                <span id="result-value" class="result-value">—</span>
            </div>
        </div>

        <div id="error-section" class="error-section hidden">
            <p id="error-message"></p>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
